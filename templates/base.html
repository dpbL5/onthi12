<!DOCTYPE html>
<html lang="vi">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nguyễn Văn Huyên Learning{% endblock %}</title>
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <!-- MathJax for LaTeX formula rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
            },
            options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
            startup: { typeset: false }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% block head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ───────────────────────────────────────────── -->
<nav class="nvh-navbar" id="mainNavbar">
    <div class="container-fluid d-flex align-items-center gap-3">
        <!-- Brand -->
        <a class="navbar-brand" href="/">
            <img src="{% static 'images/logo.png' %}" alt="Logo" style="height: 32px; margin-right: 10px; border-radius: 6px;">
            <span>Nguyễn Văn Huyên Learning</span>
        </a>

        <!-- Auth Links (updated by JS) -->
        <div class="ms-auto d-flex align-items-center gap-2" id="navAuthLinks">
            <a href="/login/" class="nav-btn">
                <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
            </a>
            <a href="/register/" class="nav-btn nav-btn-solid">
                <i class="bi bi-person-plus"></i> Đăng ký
            </a>
        </div>
    </div>
</nav>

<!-- ── Global Notifications (Bottom Right) ──────────────── -->
<div id="globalAlert" style="position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column-reverse; gap:10px; pointer-events:none; min-width:320px; max-width:420px;"></div>

<!-- ── Page Content ─────────────────────────────────────── -->
{% block content %}{% endblock %}

<!-- ── Scripts ──────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="{% static 'js/base.js' %}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
